  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(10,10,20,0) 60%, rgba(10,10,20,0.88) 100%),
      linear-gradient(90deg, rgba(10,10,20,0.96) 0%, rgba(10,10,20,0.90) 28%, rgba(10,10,20,0.60) 55%, rgba(10,10,20,0.28) 78%, rgba(10,10,20,0.00) 100%);
    z-index: 1;
  }
  .grid {
    position: relative;
    z-index: 2;
    width: 1200px;
    height: 630px;
    display: grid;
    grid-template-rows: 100px 1fr 80px;
    grid-template-columns: 1fr;
    padding: 52px 80px 48px 80px;
  }

  .logo-row {
    grid-row: 1;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .mark { width: 72px; height: 72px; display: block; }
  .wordmark { font-weight: 700; font-size: 54px; letter-spacing: -0.025em; color: #ffffff; line-height: 1; }

  .headline-wrap {
    grid-row: 2;
    align-self: center;
  }
  .tag {
    font-family: 'Space Mono', 'Menlo', monospace;
    font-size: 20px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.62);
    margin-bottom: 20px;
  }
  .headline {
    font-weight: 700;
    font-size: 86px;
    line-height: 1.02;
    letter-spacing: -0.03em;
    color: #ffffff;
    text-shadow: 0 2px 24px rgba(0, 0, 0, 0.45);
  }
  .headline .accent {
    background: linear-gradient(100deg, #BFA5FF 0%, #7BA2FF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .footer {
    grid-row: 3;
    align-self: end;
    display: flex;
