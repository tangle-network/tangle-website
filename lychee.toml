# Lychee configuration — shared between CI (.github/workflows/check-links.yml)
# and any local `lychee` invocation. Local fast-feedback path uses
# linkinator (`pnpm check:links`); lychee is the authoritative check.
#
# https://lychee.cli.rs/usage/config/

# Verbosity / output
verbose = "info"
no_progress = false

# Caching
cache = true
max_cache_age = "1d"

# Network
timeout = 20
retry_wait_time = 2
max_retries = 3
max_concurrency = 16
user_agent = "Mozilla/5.0 (compatible; tangle-link-check/1.0)"

# Status codes to accept beyond 2xx (rare but real on some hosts that
# return 999 for bots — LinkedIn — or 429 for momentary throttling).
accept = [200, 204, 206, 301, 302, 304, 307, 308, 999]

# Skip these patterns. Each is a regex against the URL.
exclude = [
  # Localhost / loopback
  "^https?://(localhost|127\\.0\\.0\\.1)",
  # Twitter/X — bot UA gets login-walled
  "^https?://(www\\.)?(twitter|x)\\.com",
  # LinkedIn — returns 999 for any non-browser UA
  "^https?://(www\\.)?linkedin\\.com",
  # Discord invite landing pages 401 to non-authed clients
  "^https?://discord\\.gg/",
  # GitHub fragment anchors (#L42 etc) flake on rate limit
  "^https?://github\\.com/.*#",
  # Mailto / tel
  "^mailto:",
  "^tel:",
  # Bp-agent partner pages — partner generator shipped, but branch
  # not yet merged to ai.tangle.tools prod. Remove this skip when
  # `feat/vertical-0-to-1-factory` lands.
  "^https?://ai\\.tangle\\.tools/partner/",
  # In-page anchor fragments (href="#section"). With --root-dir set,
  # lychee resolves these as paths and 404s — they're document-local
  # and don't need filesystem checking.
  "/%23",
  # Sandbox hero shot referenced by /services/sandbox; the screenshot
  # itself is intentionally deferred (PR #5 review item C1#1) — the
  # rendered fallback handles its absence. Remove this skip when
  # public/images/products/sandbox-app.png lands.
  "/images/products/sandbox-app\\.png$",
]

# Permanently exclude private/local paths from lychee's input scan.
exclude_path = [
  "node_modules",
  ".astro",
  "dist/server",
  # Thread-viewer utility pages are internal Twitter-thread drafts
  # that ship under public/images/blog/<slug>/thread-viewer.html.
  # they reference cover.png/diagram.png via relative paths that
  # lychee can't resolve through the input root; they aren't linked
  # from the published site, so skip the scan entirely.
  "dist/client/images/blog",
]

# Note: `fail = true` was a valid field in older lychee; v0.23+ moved
# it to a CLI-only flag (the workflow already passes `fail: true`).

