<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Agent intent infrastructure map</title>
  <desc id="desc">A technical editorial diagram showing an AI agent reading discovery files, calling manifests, using a router, sandbox, browser, payments, and verification gates.</desc>
  <rect width="1600" height="900" fill="#f7f8ff"/>
  <defs>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#18203f" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect x="104" y="92" width="1392" height="716" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="152" y="178" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="700" fill="#171827">Agent Intent Infrastructure</text>
  <text x="152" y="225" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" fill="#5d637b">Discovery, runtime, payment, and proof surfaces agents can verify before acting.</text>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="150" y="328" width="250" height="118" rx="18" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="182" y="374" font-size="25" font-weight="700" fill="#312e81">Discovery</text>
    <text x="182" y="414" font-size="19" fill="#4b5563">llms.txt · manifests</text>
    <rect x="492" y="328" width="250" height="118" rx="18" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="524" y="374" font-size="25" font-weight="700" fill="#155e75">Router</text>
    <text x="524" y="414" font-size="19" fill="#4b5563">models · health · API</text>
    <rect x="834" y="328" width="250" height="118" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="866" y="374" font-size="25" font-weight="700" fill="#166534">Sandbox</text>
    <text x="866" y="414" font-size="19" fill="#4b5563">files · processes · state</text>
    <rect x="1176" y="328" width="250" height="118" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="1208" y="374" font-size="25" font-weight="700" fill="#9a3412">Browser</text>
    <text x="1208" y="414" font-size="19" fill="#4b5563">DOM · screenshots</text>
    <path d="M405 387h82M747 387h82M1089 387h82" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <rect x="320" y="584" width="290" height="120" rx="18" fill="#faf5ff" stroke="#e9d5ff"/>
    <text x="352" y="632" font-size="25" font-weight="700" fill="#6b21a8">Payments</text>
    <text x="352" y="672" font-size="19" fill="#4b5563">x402 · paid services</text>
    <rect x="702" y="584" width="290" height="120" rx="18" fill="#fef2f2" stroke="#fecaca"/>
    <text x="734" y="632" font-size="25" font-weight="700" fill="#991b1b">Verification</text>
    <text x="734" y="672" font-size="19" fill="#4b5563">traces · health · gates</text>
    <rect x="1084" y="584" width="290" height="120" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1116" y="632" font-size="25" font-weight="700" fill="#1f2937">Blueprints</text>
    <text x="1116" y="672" font-size="19" fill="#4b5563">services · operators</text>
    <path d="M1301 446v65c0 41-33 73-74 73M958 446v65c0 41-33 73-74 73M616 446v65c0 41-33 73-74 73" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
  <circle cx="1342" cy="178" r="42" fill="url(#accent)"/>
  <path d="M1320 179h44M1342 157v44" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
</svg>
