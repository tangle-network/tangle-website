name: Collect status history

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Collect public status checks
        run: node scripts/collect-status.mjs

      - name: Commit status history
        run: |
          if git diff --quiet -- public/status/history.json; then
            echo "No status history changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/status/history.json
          git commit -m "chore(status): update public status history"
          git push origin HEAD:master

      - name: Checkout @tangle-network/brand sibling
        run: git clone --depth 1 https://github.com/tangle-network/brand.git ../brand

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/client --project-name=tangle-website --branch=production
